/* ════════════════════ QR CODE GENERATOR (self-contained) ════════════════════ */
function rsMul(x,y){let z=0;for(let i=7;i>=0;i--){z=(z<<1)^((z>>>7)*0x11D);z^=((y>>>i)&1)*x;}return z&0xFF;}
function rsDiv(deg){const r=[];for(let i=0;i<deg-1;i++)r.push(0);r.push(1);let root=1;for(let i=0;i<deg;i++){for(let j=0;j<r.length;j++){r[j]=rsMul(r[j],root);if(j+1<r.length)r[j]^=r[j+1];}root=rsMul(root,2);}return r;}
function rsRem(data,div){const r=div.map(function(){return 0;});for(const b of data){const f=b^r.shift();r.push(0);div.forEach(function(c,i){r[i]^=rsMul(c,f);});}return r;}
const ECPB=[[-1,7,10,15,20,26,18,20,24,30,18,20,24,26,30,22,24,28,30,28,28,28,28,30,30,26,28,30,30,30,30,30,30,30,30,30,30,30,30,30,30],[-1,10,16,26,18,24,16,18,22,22,26,30,22,22,24,24,28,28,26,26,26,26,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28],[-1,13,22,18,26,18,24,18,22,20,24,28,26,24,20,30,24,28,28,26,30,28,30,30,30,30,28,30,30,30,30,30,30,30,30,30,30,30,30,30,30],[-1,17,28,22,16,22,28,26,26,24,28,24,28,22,24,24,30,28,28,26,28,30,24,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30]];
const NECB=[[-1,1,1,1,1,1,2,2,2,2,4,4,4,4,4,6,6,6,6,7,8,8,9,9,10,12,12,12,13,14,15,16,17,18,19,19,20,21,22,24,25],[-1,1,1,1,2,2,4,4,4,5,5,5,8,9,9,10,10,11,13,14,16,17,17,18,20,21,23,25,26,28,29,31,33,35,37,38,40,43,45,47,49],[-1,1,1,2,2,4,4,6,6,8,8,8,10,12,16,12,17,16,18,21,20,23,23,25,27,29,34,34,35,38,40,43,45,48,51,53,56,59,62,65,68],[-1,1,1,2,4,4,4,5,6,8,8,11,11,16,16,18,16,19,21,25,25,25,34,30,32,35,37,40,42,45,48,51,54,57,60,63,66,70,74,77,81]];
class QrCode{
  constructor(ver,ecl,dataCw,mask){this.version=ver;this.ecl=ecl;this.size=ver*4+17;this.mod=[];this.fn=[];for(let i=0;i<this.size;i++){this.mod.push(new Array(this.size).fill(false));this.fn.push(new Array(this.size).fill(false));}this.drawFn();const all=this.addEcc(dataCw);this.drawCw(all);if(mask<0){let mp=Infinity,bm=0;for(let m=0;m<8;m++){this.applyMask(m);this.drawFmt(m);const p=this.penalty();if(p<mp){bm=m;mp=p;}this.applyMask(m);}mask=bm;}this.applyMask(mask);this.drawFmt(mask);}
  static encodeText(t,ecl){const bytes=[];for(const ch of unescape(encodeURIComponent(t)))bytes.push(ch.charCodeAt(0));return QrCode.encodeBytes(bytes,ecl);}
  static encodeBytes(data,ecl){for(let v=1;v<=40;v++){const cap=QrCode.numDataCw(v,ecl)*8,cc=v<=9?8:16;if(4+cc+data.length*8<=cap){const bb=[];const ap=function(val,len){for(let i=len-1;i>=0;i--)bb.push((val>>>i)&1);};ap(0x4,4);ap(data.length,cc);for(const b of data)ap(b,8);ap(0,Math.min(4,cap-bb.length));while(bb.length%8)bb.push(0);const dcw=[];for(let i=0;i<bb.length;i+=8){let by=0;for(let j=0;j<8;j++)by=(by<<1)|bb[i+j];dcw.push(by);}for(let pad=0xEC;dcw.length<QrCode.numDataCw(v,ecl);pad^=0xEC^0x11)dcw.push(pad);return new QrCode(v,ecl,dcw,-1);}}throw new Error("too long");}
  static numRawMod(v){let r=(16*v+128)*v+64;if(v>=2){const n=Math.floor(v/7)+2;r-=(25*n-10)*n-55;if(v>=7)r-=36;}return r;}
  static numDataCw(v,ecl){return Math.floor(QrCode.numRawMod(v)/8)-ECPB[ecl][v]*NECB[ecl][v];}
  setFn(x,y,d){this.mod[y][x]=d;this.fn[y][x]=true;}
  drawFn(){const s=this.size;for(let i=0;i<s;i++){this.setFn(6,i,i%2===0);this.setFn(i,6,i%2===0);}this.finder(3,3);this.finder(s-4,3);this.finder(3,s-4);const ap=this.alignPos(),n=ap.length;for(let i=0;i<n;i++)for(let j=0;j<n;j++)if(!((i===0&&j===0)||(i===0&&j===n-1)||(i===n-1&&j===0)))this.align(ap[i],ap[j]);this.drawFmt(0);this.drawVer();}
  finder(x,y){for(let dy=-4;dy<=4;dy++)for(let dx=-4;dx<=4;dx++){const d=Math.max(Math.abs(dx),Math.abs(dy)),xx=x+dx,yy=y+dy;if(xx>=0&&xx<this.size&&yy>=0&&yy<this.size)this.setFn(xx,yy,d!==2&&d!==4);}}
  align(x,y){for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++)this.setFn(x+dx,y+dy,Math.max(Math.abs(dx),Math.abs(dy))!==1);}
  alignPos(){if(this.version===1)return[];const n=Math.floor(this.version/7)+2,step=Math.floor((this.version*4+4)/(n*2-2))*2,r=[6];for(let p=this.size-7;r.length<n;p-=step)r.splice(1,0,p);return r;}
  drawFmt(mask){const data=this.ecl<<3|mask;let rem=data;for(let i=0;i<10;i++)rem=(rem<<1)^((rem>>>9)*0x537);const bits=((data<<10|rem)^0x5412)&0x7FFF;for(let i=0;i<=5;i++)this.setFn(8,i,((bits>>>i)&1)!==0);this.setFn(8,7,((bits>>>6)&1)!==0);this.setFn(8,8,((bits>>>7)&1)!==0);this.setFn(7,8,((bits>>>8)&1)!==0);for(let i=9;i<15;i++)this.setFn(14-i,8,((bits>>>i)&1)!==0);for(let i=0;i<8;i++)this.setFn(this.size-1-i,8,((bits>>>i)&1)!==0);for(let i=8;i<15;i++)this.setFn(8,this.size-15+i,((bits>>>i)&1)!==0);this.setFn(8,this.size-8,true);}
  drawVer(){if(this.version<7)return;let rem=this.version;for(let i=0;i<12;i++)rem=(rem<<1)^((rem>>>11)*0x1F25);const bits=this.version<<12|rem;for(let i=0;i<18;i++){const b=((bits>>>i)&1)!==0,a=this.size-11+i%3,c=Math.floor(i/3);this.setFn(a,c,b);this.setFn(c,a,b);}}
  addEcc(data){const v=this.version,ecl=this.ecl,nb=NECB[ecl][v],bel=ECPB[ecl][v];const raw=Math.floor(QrCode.numRawMod(v)/8),nsb=nb-raw%nb,sbl=Math.floor(raw/nb);const blocks=[],div=rsDiv(bel);let k=0;for(let i=0;i<nb;i++){const dl=sbl-bel+(i<nsb?0:1),dat=data.slice(k,k+dl);k+=dl;const ecc=rsRem(dat.slice(),div);if(i<nsb)dat.push(0);blocks.push(dat.concat(ecc));}const res=[];for(let i=0;i<blocks[0].length;i++)blocks.forEach(function(bl,j){if(i!==sbl-bel||j>=nsb)res.push(bl[i]);});return res;}
  drawCw(data){let i=0;for(let right=this.size-1;right>=1;right-=2){if(right===6)right=5;for(let vert=0;vert<this.size;vert++)for(let j=0;j<2;j++){const x=right-j,up=((right+1)&2)===0,y=up?this.size-1-vert:vert;if(!this.fn[y][x]&&i<data.length*8){this.mod[y][x]=((data[i>>>3]>>>(7-(i&7)))&1)!==0;i++;}}}}
  applyMask(m){for(let y=0;y<this.size;y++)for(let x=0;x<this.size;x++){let inv;switch(m){case 0:inv=(x+y)%2===0;break;case 1:inv=y%2===0;break;case 2:inv=x%3===0;break;case 3:inv=(x+y)%3===0;break;case 4:inv=(Math.floor(x/3)+Math.floor(y/2))%2===0;break;case 5:inv=x*y%2+x*y%3===0;break;case 6:inv=(x*y%2+x*y%3)%2===0;break;case 7:inv=((x+y)%2+x*y%3)%2===0;break;}if(!this.fn[y][x]&&inv)this.mod[y][x]=!this.mod[y][x];}}
  penalty(){let r=0;const s=this.size,m=this.mod;for(let y=0;y<s;y++){let rc=false,rx=0;for(let x=0;x<s;x++){if(m[y][x]===rc){rx++;if(rx===5)r+=3;else if(rx>5)r++;}else{rc=m[y][x];rx=1;}}}for(let x=0;x<s;x++){let rc=false,ry=0;for(let y=0;y<s;y++){if(m[y][x]===rc){ry++;if(ry===5)r+=3;else if(ry>5)r++;}else{rc=m[y][x];ry=1;}}}for(let y=0;y<s-1;y++)for(let x=0;x<s-1;x++){const c=m[y][x];if(c===m[y][x+1]&&c===m[y+1][x]&&c===m[y+1][x+1])r+=3;}let dark=0;for(const row of m)for(const v of row)if(v)dark++;r+=(Math.ceil(Math.abs(dark*20-s*s*10)/(s*s))-1)*10;return r;}
}
function generateQR(text){try{return QrCode.encodeText(text,1).mod;}catch(e){try{return QrCode.encodeText(text,0).mod;}catch(e2){return null;}}}
function qrSvgString(value,size){
  const matrix=generateQR(value);
  if(!matrix) return '<div style="width:'+size+'px;height:'+size+'px;background:#fff;color:#000;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:12px;border-radius:6px;text-align:center;padding:20px">QR-Fehler</div>';
  const n=matrix.length,q=4,total=n+q*2,cell=size/total;
  let path='';
  for(let y=0;y<n;y++)for(let x=0;x<n;x++)if(matrix[y][x])path+='M'+((x+q)*cell)+' '+((y+q)*cell)+'h'+cell+'v'+cell+'h'+(-cell)+'z';
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" style="border-radius:6px;display:block"><rect width="'+size+'" height="'+size+'" fill="#fff"/><path d="'+path+'" fill="#000"/></svg>';
}

/* ════════════════════ DOM helper ════════════════════ */
function h(tag,props,children){
  const e=document.createElement(tag);
  props=props||{};
  for(const k in props){
    const val=props[k];
    if(val===null||val===undefined||val===false) continue;
    if(k==="style"){ for(const sk in val) e.style[sk]=val[sk]; }
    else if(k==="class") e.className=val;
    else if(k==="html") e.innerHTML=val;
    else if(k.slice(0,2)==="on" && typeof val==="function") e.addEventListener(k.slice(2).toLowerCase(),val);
    else if(k==="checked"||k==="disabled"||k==="muted"||k==="playsInline") e[k]=val;
    else e.setAttribute(k,val);
  }
  const kids=Array.isArray(children)?children:(children!==undefined?[children]:[]);
  for(const c of kids){
    if(c===null||c===undefined||c===false) continue;
    e.appendChild(typeof c==="object"?c:document.createTextNode(String(c)));
  }
  return e;
}

/* ════════════════════ safe storage (some contexts block localStorage) ════════════════════ */
function safeGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function safeSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

/* ════════════════════ sync (ntfy.sh) ════════════════════ */
const NTFY="https://ntfy.sh";
const STORAGE_KEY="sprint_room_v6";
function topic(c){return "sprintrace-"+c.toLowerCase();}
function broadcastGo(code,ts){
  fetch(NTFY+"/"+topic(code),{method:"POST",body:String(ts),headers:{Title:"GO",Priority:"urgent"}}).catch(function(e){console.warn(e);});
}
function pollGo(code,sinceSec){
  return fetch(NTFY+"/"+topic(code)+"/json?poll=1&since="+sinceSec,{signal:timeoutSignal(4000)})
    .then(function(r){return r.text();})
    .then(function(t){
      const lines=t.trim().split("\n").reverse();
      for(const line of lines){ try{ const m=JSON.parse(line); const ts=parseInt(m.message); if(!isNaN(ts)&&ts>Date.now()-120000) return ts; }catch(e){} }
      return null;
    }).catch(function(){return null;});
}

/* ════════════════════ audio ════════════════════ */
let sharedCtx=null;
function getCtx(){ if(!sharedCtx) sharedCtx=new (window.AudioContext||window.webkitAudioContext)(); if(sharedCtx.state==="suspended") sharedCtx.resume(); return sharedCtx; }
function playCountdown(onGo){
  let ctx; try{ ctx=getCtx(); }catch(e){ setTimeout(onGo,3000); return; }
  function beep(f,t,d,v){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type="sine";g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+.01);g.gain.linearRampToValueAtTime(0,t+d);o.start(t);o.stop(t+d+.05);}
  const n=ctx.currentTime;
  beep(660,n,.12,.4);beep(660,n+1,.12,.4);beep(660,n+2,.12,.4);beep(1320,n+3,.55,1.0);
  setTimeout(onGo,3000);
}
function blip(){ try{const ctx=getCtx();const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=1760;o.type="square";const t=ctx.currentTime;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.3,t+.01);g.gain.linearRampToValueAtTime(0,t+.1);o.start(t);o.stop(t+.12);}catch(e){} }

/* ════════════════════ bracket ════════════════════ */
function buildBracket(names){
  const n=names.length; if(n<2) return [];
  let size=1; while(size<n) size*=2;
  const byes=size-n, byePlayers=names.slice(0,byes), r1Players=names.slice(byes);
  const matches=[]; let id=0, round=1; const r1refs=[];
  for(let i=0;i<r1Players.length;i+=2){ matches.push({id:id,a:r1Players[i],b:r1Players[i+1],aFrom:null,bFrom:null,round:round,winner:null}); r1refs.push({type:"match",id:id}); id++; }
  let entrants=byePlayers.map(function(p){return {type:"name",name:p};}).concat(r1refs); round++;
  while(entrants.length>1){ const next=[]; for(let i=0;i<entrants.length;i+=2){ const A=entrants[i],B=entrants[i+1]; matches.push({id:id, a:A&&A.type==="name"?A.name:null, b:B&&B.type==="name"?B.name:null, aFrom:A&&A.type==="match"?A.id:null, bFrom:B&&B.type==="match"?B.id:null, round:round, winner:null}); next.push({type:"match",id:id}); id++; } entrants=next; round++; }
  return matches;
}

/* ════════════════════ utils ════════════════════ */
function fmt(ms){ return (ms===null||ms===undefined)?"--":(ms/1000).toFixed(2)+"s"; }
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i];a[i]=a[j];a[j]=t; } return a; }
function timeoutSignal(ms){ try{ return AbortSignal.timeout(ms); }catch(e){ return undefined; } }
const G="#FFD700", BG="#080808";

/* ════════════════════ STATE ════════════════════ */
const hashMatch=window.location.hash.match(/#finish:([^:]+)/);
const isFinish=!!hashMatch;
const S={
  roomCode: hashMatch?hashMatch[1]:(safeGet(STORAGE_KEY)||""),
  roomSaved: !!(hashMatch?hashMatch[1]:safeGet(STORAGE_KEY)),
  tab: isFinish?"finish":"setup",
  isFullscreen:false,
  raceStartTs:null, elapsed:0, countdown:null,
  sensitivity:28, distance:40, soundOn:true, cameraFacing:"environment",
  detections:[], zoomPhoto:null, namePickerFor:null, copied:false,
  publishedUrl: safeGet("sprint_url")||"",
  boys:[], girls:[],
  bracketBoys:[], bracketGirls:[], tournamentActive:false,
};

/* persistent (across renders) */
let videoEl=null, canvasEl=null, mediaStream=null, motionRAF=null, motionPrev=null, motionLastHit=0;
let timerInterval=null, pollInterval=null;

/* ════════════════════ actions ════════════════════ */
function saveRoom(){
  const inp=document.getElementById("roomInput");
  if(!inp) return;
  const c=inp.value.trim().toUpperCase().replace(/[^A-Z0-9]/g,"");
  if(!c) return;
  S.roomCode=c; S.roomSaved=true; safeSet(STORAGE_KEY,c); render();
}
function toggleFullscreen(){
  try{
    if(!document.fullscreenElement){ document.documentElement.requestFullscreen(); S.isFullscreen=true; }
    else { document.exitFullscreen(); S.isFullscreen=false; }
  }catch(e){console.warn(e);}
  setTimeout(render,100);
}
function startRace(){
  if(!S.roomCode) return;
  getCtx();
  S.countdown=3; render();
  setTimeout(function(){S.countdown=2;render();},1000);
  setTimeout(function(){S.countdown=1;render();},2000);
  playCountdown(function(){
    const ts=Date.now();
    S.countdown="GO!"; S.raceStartTs=ts; render();
    setTimeout(function(){S.countdown=null;render();},800);
    broadcastGo(S.roomCode,ts);
    startTimer();
  });
}
function resetRace(){ S.raceStartTs=null; S.detections=[]; S.elapsed=0; S.countdown=null; stopTimer(); render(); }
function startTournament(){
  S.bracketBoys=buildBracket(shuffle(S.boys));
  S.bracketGirls=buildBracket(shuffle(S.girls));
  S.tournamentActive=true; S.tab="turnier"; render();
}
function resetTournament(){ S.tournamentActive=false; S.bracketBoys=[]; S.bracketGirls=[]; render(); }
function pickWinner(group,matchId,winner){
  const arr=group==="j"?S.bracketBoys:S.bracketGirls;
  const m=arr.find(function(x){return x.id===matchId;});
  if(!m||m.winner) return;
  m.winner=winner;
  arr.forEach(function(x){ if(x.aFrom===matchId) x.a=winner; if(x.bFrom===matchId) x.b=winner; });
  render();
}
function addRunner(group){
  const inp=document.getElementById(group==="j"?"boyInput":"girlInput");
  if(!inp||!inp.value.trim()) return;
  (group==="j"?S.boys:S.girls).push(inp.value.trim());
  render();
  const ni=document.getElementById(group==="j"?"boyInput":"girlInput");
  if(ni) ni.focus();
}
function removeRunner(group,i){ (group==="j"?S.boys:S.girls).splice(i,1); render(); }
function recordDetection(ms,name){
  S.detections.push({id:Date.now()+Math.random(),ms:ms,photo:lastPhoto,name:name||null});
  if(S.soundOn) blip();
  render();
}
let lastPhoto=null;
function manualCapture(){
  if(!S.raceStartTs||!videoEl||!canvasEl) return;
  canvasEl.getContext("2d").drawImage(videoEl,0,0,canvasEl.width,canvasEl.height);
  lastPhoto=canvasEl.toDataURL("image/jpeg",0.65);
  recordDetection(Date.now()-S.raceStartTs,"(manuell)");
}
function deleteDetection(id){ S.detections=S.detections.filter(function(x){return x.id!==id;}); render(); }
function assignName(id,name){ const d=S.detections.find(function(x){return x.id===id;}); if(d)d.name=name; S.namePickerFor=null; render(); }
function exportResults(){
  const ranked=S.detections.filter(function(d){return d.name;}).sort(function(a,b){return a.ms-b.ms;});
  let txt="🏃 SPRINT-ERGEBNISSE ("+S.distance+"m)\n────────────────────────\n";
  ranked.forEach(function(d,i){ txt+=(["🥇","🥈","🥉"][i]||(i+1)+".")+" "+d.name+" — "+fmt(d.ms)+"\n"; });
  if(navigator.clipboard) navigator.clipboard.writeText(txt);
  S.copied=true; render(); setTimeout(function(){S.copied=false;render();},2000);
}
function copyUrl(url){ if(navigator.clipboard) navigator.clipboard.writeText(url); S.copied=true; render(); setTimeout(function(){S.copied=false;render();},2000); }

function cleanBase(u){ u=(u||"").trim(); const hi=u.indexOf("#"); if(hi>=0) u=u.slice(0,hi); return u; }
function autoBase(){
  const o=window.location.origin, p=window.location.pathname, proto=window.location.protocol;
  if(o && o!=="null" && (proto==="http:"||proto==="https:")) return o+p;
  return null; // running in srcdoc/preview/file — not a real address
}
function baseUrl(){ if(S.publishedUrl) return cleanBase(S.publishedUrl); const ab=autoBase(); return ab||""; }
function finishUrl(){ const b=baseUrl(); return (b&&S.roomCode)?b+"#finish:"+S.roomCode:""; }
function savePublishedUrl(){ const inp=document.getElementById("pubUrlInput"); if(!inp) return; S.publishedUrl=cleanBase(inp.value); safeSet("sprint_url",S.publishedUrl); render(); }
function clearPublishedUrl(){ S.publishedUrl=""; safeSet("sprint_url",""); render(); }

/* ════════════════════ timer ════════════════════ */
function startTimer(){
  stopTimer();
  timerInterval=setInterval(function(){
    if(!S.raceStartTs) return;
    S.elapsed=Date.now()-S.raceStartTs;
    const t=document.getElementById("timerText");
    if(t) t.textContent=fmt(S.elapsed);
  },50);
}
function stopTimer(){ if(timerInterval){clearInterval(timerInterval);timerInterval=null;} }

/* ════════════════════ poll for GO (finish device) ════════════════════ */
let pollSince=Math.floor(Date.now()/1000)-5;
function startPoll(){
  stopPoll();

    });

}

/* ════════════════════ camera + motion ════════════════════ */
function ensureVideoCanvas(){
  if(!videoEl){
    videoEl=document.createElement("video");
    videoEl.setAttribute("playsinline","");
    videoEl.muted=true; videoEl.playsInline=true;
    videoEl.style.width="100%"; videoEl.style.display="block";
  }
  if(!canvasEl){
    canvasEl=document.createElement("canvas");
    canvasEl.width=720; canvasEl.height=540; canvasEl.style.display="none";
  }
}
let cameraStarting=false;
function startCamera(){
  ensureVideoCanvas();
  if(mediaStream||cameraStarting) return;
  cameraStarting=true;
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:S.cameraFacing},width:{ideal:720}}})
    .then(function(s){ cameraStarting=false; mediaStream=s; videoEl.srcObject=s; videoEl.play(); motionLoop(); })
    .catch(function(e){ cameraStarting=false; console.warn("Kamera:",e); });
}
function switchCamera(){
  S.cameraFacing = S.cameraFacing==="environment"?"user":"environment";
  stopCamera(); cameraStarting=false; startCamera(); render();
}
function stopCamera(){
  if(motionRAF){cancelAnimationFrame(motionRAF);motionRAF=null;}
  if(mediaStream){ mediaStream.getTracks().forEach(function(t){t.stop();}); mediaStream=null; }
  motionPrev=null;
}
function motionLoop(){
  motionRAF=requestAnimationFrame(motionLoop);
  if(!videoEl||!canvasEl||videoEl.readyState<2) return;
  const cx=canvasEl.getContext("2d"),W=canvasEl.width,H=canvasEl.height;
  cx.drawImage(videoEl,0,0,W,H);
  const zY=Math.floor(H*0.35),zH=Math.floor(H*0.30);
  const cur=cx.getImageData(0,zY,W,zH).data;
  if(motionPrev&&motionPrev.length===cur.length){
    let d=0;
    for(let i=0;i<cur.length;i+=4) d+=Math.abs(cur[i]-motionPrev[i])+Math.abs(cur[i+1]-motionPrev[i+1])+Math.abs(cur[i+2]-motionPrev[i+2]);
    const avg=d/(cur.length/4), now=Date.now();
    if(avg>S.sensitivity && now-motionLastHit>350 && S.raceStartTs){
      motionLastHit=now;
      lastPhoto=canvasEl.toDataURL("image/jpeg",0.65);
      recordDetection(Date.now()-S.raceStartTs,null);
    }
  }
  motionPrev=new Uint8ClampedArray(cur);
}
function syncCamera(){
  const shouldRun=isFinish&&S.raceStartTs&&S.tab==="finish";
  if(shouldRun) startCamera();
  else stopCamera();
}

    {num:"03",title:"ARMARBEIT",color:"#FF4444",points:["Ellenbogen bei 90°","Hände locker — kein Faustballen","Arme eng, keine Querbewegung","Schnelle Arme = schnelle Beine"],tip:"Die Arme sind dein Taktgeber. Wer schneller schwingt, läuft schneller.",vid:"ZFdTU28HD5M",search:"sprint arm action technique"}
  ];
  cards.forEach(function(c){
    const ul=h("ul",{class:"sans",style:{margin:"0",padding:"0 0 0 16px",fontSize:"12px",color:"#ccc",lineHeight:"1.9"}},c.points.map(function(p){return h("li",{},p);}));
    const vidLink=h("a",{href:"https://www.youtube.com/watch?v="+c.vid,target:"_blank",rel:"noopener noreferrer",style:{display:"flex",alignItems:"center",gap:"12px",textDecoration:"none",marginTop:"10px",background:"linear-gradient(135deg,#1a0000,#240000)",border:"1px solid #FF000066",borderRadius:"4px",padding:"12px"}},[
      h("div",{style:{width:"42px",height:"42px",flexShrink:"0",background:"#FF0000",borderRadius:"6px",display:"flex",alignItems:"center",justifyContent:"center"}},[

      ]),
      h("div",{style:{flex:"1",minWidth:"0"}},[
        h("div",{class:"sans",style:{color:"#fff",fontSize:"13px",fontWeight:"700"}},"Video ansehen"),
        h("div",{class:"sans",style:{color:"#ff6666",fontSize:"10px",letterSpacing:"1px",marginTop:"2px"}},"▶ AUF YOUTUBE ÖFFNEN")
      ])
    ]);
    const searchHint=h("div",{class:"sans",style:{marginTop:"6px",fontSize:"10px",color:"#888"}});
    searchHint.innerHTML='Falls Link nicht öffnet → auf YouTube suchen: <span style="font-style:italic;color:#aaa">„'+c.search+'"</span>';
    wrap.appendChild(h("div",{style:{background:"#111",borderLeft:"4px solid "+c.color,borderRadius:"4px",padding:"16px",marginBottom:"14px"}},[
      h("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"}},[

      vidLink, searchHint

}

function tabFinish(){
  const wrap=h("div",{});
  wrap.appendChild(subtitle("FOTO-FINISH · HANDY"));
  if(!S.raceStartTs){
    wrap.appendChild(h("div",{style:{textAlign:"center",background:"#111",border:"1px solid #333",borderRadius:"8px",padding:"32px 20px"}},[
      h("div",{style:{fontSize:"48px",marginBottom:"12px"}},"🏁"),
      h("div",{style:{color:G,fontSize:"16px",letterSpacing:"3px",marginBottom:"10px"}},"WARTE AUF START"),
      h("div",{class:"sans",style:{fontSize:"13px",color:"#666"}},[
        "Code: ", h("span",{style:{color:G,fontSize:"18px",letterSpacing:"4px",fontWeight:"900"}},S.roomCode)
      ]),
      h("div",{style:{marginTop:"16px",display:"flex",justifyContent:"center",alignItems:"center",gap:"8px"}},[
        h("div",{style:{width:"8px",height:"8px",borderRadius:"50%",background:"#00FF88",animation:"blink 1.2s infinite"}}),
        h("span",{class:"sans",style:{fontSize:"11px",color:"#00FF88",letterSpacing:"1px"}},"VERBUNDEN")
      ])
    ]));
    if(!S.roomCode){
      wrap.appendChild(h("div",{class:"sans",style:{textAlign:"center",color:"#888",fontSize:"12px",marginTop:"14px",lineHeight:"1.6"}},"Kein Code gesetzt. Öffne den Link vom Tablet (QR-Code) oder gib oben den gleichen Code wie auf dem Tablet ein."));
    }
    return wrap;
  }
  // active race
  wrap.appendChild(h("div",{style:{textAlign:"center",marginBottom:"10px"}},[
    h("div",{id:"timerText",style:{fontSize:"48px",fontFamily:"monospace",fontWeight:"900",color:"#00FF88",letterSpacing:"4px",textShadow:"0 0 20px #00FF88"}},fmt(S.elapsed))
  ]));
  // camera container — reuse persistent videoEl/canvasEl
  ensureVideoCanvas();
  const camWrap=h("div",{style:{position:"relative",borderRadius:"6px",overflow:"hidden",border:"2px solid #333",marginBottom:"10px",background:"#000"}});
  camWrap.appendChild(videoEl);
  camWrap.appendChild(canvasEl);
  const zone=h("div",{style:{position:"absolute",top:"35%",left:"0",right:"0",height:"30%",borderTop:"2px dashed rgba(255,68,68,0.9)",borderBottom:"2px dashed rgba(255,68,68,0.9)",background:"rgba(255,68,68,0.05)",pointerEvents:"none"}},[
    h("div",{class:"sans",style:{position:"absolute",top:"-18px",left:"8px",fontSize:"10px",color:"#FF4444",background:"rgba(0,0,0,0.75)",padding:"2px 6px",borderRadius:"2px"}},"🎯 ZIELLINIE-ZONE")
  ]);
  camWrap.appendChild(zone);
  if(S.detections.length>0) camWrap.appendChild(h("div",{class:"sans",style:{position:"absolute",top:"8px",right:"8px",background:"#00FF88",color:"#000",fontWeight:"900",fontSize:"11px",padding:"4px 10px",borderRadius:"3px"}},"📸 "+S.detections.length));
  wrap.appendChild(camWrap);
  // camera switch button
  wrap.appendChild(h("button",{class:"sans",onClick:switchCamera,style:{width:"100%",padding:"10px",background:"#1a1a1a",color:G,border:"1px solid "+G+"44",fontSize:"12px",fontWeight:"700",borderRadius:"4px",cursor:"pointer",marginBottom:"10px"}},"🔄 Kamera wechseln · aktuell: "+(S.cameraFacing==="environment"?"RÜCKKAMERA":"SELFIE-KAMERA")));
  // thumbnails
  if(S.detections.length>0){
    const enriched=enrich(S.detections);
    const strip=h("div",{style:{display:"flex",gap:"6px",overflowX:"auto",paddingBottom:"4px"}},enriched.map(function(d){
      const t=h("div",{style:{flexShrink:"0",position:"relative"}},[
        h("img",{src:d.photo,width:"70",height:"52",onClick:function(){S.zoomPhoto=d.photo;render();},style:{borderRadius:"3px",border:d.suspicious?"2px solid #FF4444":"2px solid #333",cursor:"pointer",objectFit:"cover"}}),
        h("div",{style:{position:"absolute",bottom:"2px",left:"2px",background:"rgba(0,0,0,0.8)",color:"#00FF88",fontSize:"9px",fontFamily:"monospace",padding:"1px 4px",borderRadius:"2px"}},fmt(d.ms))
      ]);
      if(d.suspicious) t.appendChild(h("div",{class:"sans",style:{position:"absolute",top:"-4px",right:"-4px",background:"#FF4444",color:"#fff",fontSize:"9px",padding:"1px 4px",borderRadius:"8px",fontWeight:"900"}},"?"));
      return t;
    }));
    wrap.appendChild(h("div",{style:{marginBottom:"10px"}},[
      h("div",{class:"sans",style:{fontSize:"10px",color:"#666",marginBottom:"4px",letterSpacing:"1px"}},"AUFGENOMMEN:"), strip
    ]));
  }
  // sensitivity
  const sensLabel=S.sensitivity<20?"SEHR HOCH":S.sensitivity<35?"HOCH":S.sensitivity<55?"MITTEL":"NIEDRIG";
  const slider=h("input",{type:"range",min:"8",max:"80",value:String(S.sensitivity),oninput:function(e){S.sensitivity=parseInt(e.target.value);const lbl=document.getElementById("sensLbl");if(lbl)lbl.textContent=(S.sensitivity<20?"SEHR HOCH":S.sensitivity<35?"HOCH":S.sensitivity<55?"MITTEL":"NIEDRIG");},style:{width:"100%",accentColor:G}});
  const soundChk=h("input",{type:"checkbox",checked:S.soundOn,onChange:function(e){S.soundOn=e.target.checked;}});
  soundChk.style.accentColor=G;
  wrap.appendChild(h("div",{style:{background:"#111",borderRadius:"4px",padding:"10px 14px",marginBottom:"10px"}},[
    h("div",{class:"sans",style:{display:"flex",justifyContent:"space-between",fontSize:"11px",color:"#888",marginBottom:"4px"}},[
      h("span",{},"Empfindlichkeit"), h("span",{id:"sensLbl",style:{color:G}},sensLabel)
    ]),
    slider,
    h("label",{class:"sans",style:{display:"flex",alignItems:"center",gap:"8px",marginTop:"8px",fontSize:"11px",color:"#888",cursor:"pointer"}},[soundChk," Piepton bei Erkennung"])
  ]));
  wrap.appendChild(h("button",{onClick:manualCapture,style:{width:"100%",padding:"16px",background:"#FF4444",color:"#fff",border:"none",fontSize:"15px",fontWeight:"900",letterSpacing:"2px",borderRadius:"4px",cursor:"pointer",marginBottom:"10px"}},"🖐 MANUELL: FOTO + ZEIT"));
  wrap.appendChild(h("button",{onClick:function(){S.tab="review";render();},style:{width:"100%",padding:"14px",background:G,color:"#000",border:"none",fontSize:"14px",fontWeight:"900",letterSpacing:"2px",borderRadius:"4px",cursor:"pointer"}},"🔍 ZUR AUSWERTUNG ("+S.detections.length+")"));
  return wrap;
}

function enrich(dets){
  return dets.map(function(d,i,arr){
    const susp=(i>0&&d.ms-arr[i-1].ms<400)||(i<arr.length-1&&arr[i+1].ms-d.ms<400);
    return {id:d.id,ms:d.ms,photo:d.photo,name:d.name,suspicious:susp};
  });
}

function tabReview(){
  const wrap=h("div",{});
  wrap.appendChild(subtitle("AUSWERTUNG · FOTOS PRÜFEN"));
  const info=h("div",{class:"sans",style:{background:"#FFD70011",border:"1px solid #FFD70044",borderRadius:"4px",padding:"12px",marginBottom:"14px",fontSize:"12px",color:"#ddd",lineHeight:"1.7"}});
  info.innerHTML='<strong style="color:'+G+'">So geht\'s:</strong><br>• Jedes Foto = ein erkannter Läufer<br>• <span style="color:#FF4444">Rot</span> = verdächtig nah (evtl. doppelt)<br>• <strong>+ NAME</strong> → aus Liste wählen · <strong>🗑</strong> → falscher Treffer löschen';
  wrap.appendChild(info);
  if(S.detections.length===0){
    wrap.appendChild(h("div",{class:"sans",style:{textAlign:"center",color:"#555",fontSize:"13px",padding:"30px"}},"Noch keine Fotos. Starte ein Rennen."));
    return wrap;
  }
  const enriched=enrich(S.detections);
  enriched.forEach(function(d,i){
    const right=h("div",{style:{flex:"1"}});
    right.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"6px"}},[
      h("span",{style:{color:G,fontSize:"13px",letterSpacing:"1px"}},"FOTO #"+(i+1)),
      h("span",{style:{color:"#00FF88",fontFamily:"monospace",fontSize:"16px",fontWeight:"900"}},fmt(d.ms))
    ]));
    if(d.suspicious) right.appendChild(h("div",{class:"sans",style:{background:"#FF444422",color:"#FF8888",fontSize:"10px",padding:"3px 8px",borderRadius:"3px",marginBottom:"6px",display:"inline-block"}},"⚠ Verdacht: doppelt"));
    right.appendChild(h("div",{style:{marginBottom:"8px"}},[
      d.name
        ? h("span",{class:"sans",style:{background:"#00FF8822",color:"#00FF88",padding:"4px 10px",borderRadius:"3px",fontSize:"13px",fontWeight:"700"}},"✓ "+d.name)
        : h("span",{class:"sans",style:{color:"#666",fontSize:"12px",fontStyle:"italic"}},"kein Name")
    ]));
    right.appendChild(h("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap"}},[
      h("button",{onClick:function(){S.namePickerFor=d.id;render();},style:{background:"#1a1a1a",color:G,border:"1px solid "+G+"44",padding:"6px 12px",fontSize:"11px",fontWeight:"700",borderRadius:"3px",cursor:"pointer",letterSpacing:"1px"}},d.name?"✏ ÄNDERN":"+ NAME"),
      h("button",{onClick:function(){deleteDetection(d.id);},style:{background:"#1a1a1a",color:"#FF4444",border:"1px solid #FF444444",padding:"6px 10px",fontSize:"13px",borderRadius:"3px",cursor:"pointer"}},"🗑")
    ]));
    wrap.appendChild(h("div",{style:{background:"#111",border:d.suspicious?"2px solid #FF4444":"1px solid #333",borderRadius:"6px",padding:"12px",marginBottom:"12px",display:"flex",gap:"12px",alignItems:"flex-start"}},[
      h("img",{src:d.photo,width:"110",height:"82",onClick:function(){S.zoomPhoto=d.photo;render();},style:{borderRadius:"4px",cursor:"pointer",objectFit:"cover",flexShrink:"0"}}),
      right
    ]));
  });
  const named=S.detections.filter(function(d){return d.name;}).sort(function(a,b){return a.ms-b.ms;});
  if(named.length>0){
    const standBox=h("div",{style:{marginTop:"20px",background:"#0f0f0f",border:"1px solid "+G+"44",borderRadius:"6px",padding:"14px"}});
    standBox.appendChild(h("div",{style:{color:G,fontSize:"14px",letterSpacing:"3px",marginBottom:"10px",textAlign:"center"}},"🏆 ENDSTAND · "+S.distance+"m"));
    named.forEach(function(d,i){
      standBox.appendChild(h("div",{class:"sans",style:{display:"flex",justifyContent:"space-between",padding:"9px 14px",background:"#1a1a1a",borderRadius:"3px",marginBottom:"5px"}},[
        h("span",{style:{color:medalColor(i),fontSize:"14px"}},medal(i)+" "+d.name),
        h("span",{style:{color:"#00FF88",fontFamily:"monospace",fontWeight:"700"}},fmt(d.ms))
      ]));
    });
    standBox.appendChild(h("button",{onClick:exportResults,style:{width:"100%",marginTop:"10px",background:G,color:"#000",border:"none",padding:"10px",fontSize:"12px",fontWeight:"900",letterSpacing:"1px",borderRadius:"3px",cursor:"pointer"}},S.copied?"✓ KOPIERT":"📋 ERGEBNISSE KOPIEREN"));
    wrap.appendChild(standBox);
  }
  return wrap;
}

function buildZoom(){
  return h("div",{onClick:function(){S.zoomPhoto=null;render();},style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.95)",zIndex:"100",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",cursor:"pointer"}},[
    h("img",{src:S.zoomPhoto,style:{maxWidth:"100%",maxHeight:"100%",borderRadius:"4px"}}),
    h("div",{style:{position:"absolute",top:"20px",right:"20px",color:"#fff",fontSize:"28px"}},"×")
  ]);
}
function buildNamePicker(){
  const all=S.boys.map(function(n){return {name:n,g:"j"};}).concat(S.girls.map(function(n){return {name:n,g:"m"};}));
  const list=h("div",{style:{display:"flex",flexDirection:"column",gap:"6px",maxHeight:"50vh",overflowY:"auto"}},
    all.map(function(r){
      return h("button",{class:"sans",onClick:function(){assignName(S.namePickerFor,r.name);},style:{background:"#1a1a1a",color:"#fff",border:"1px solid "+(r.g==="j"?"#4488FF44":"#FF44AA44"),padding:"12px 14px",fontSize:"14px",textAlign:"left",borderRadius:"3px",cursor:"pointer"}},(r.g==="j"?"👦":"👧")+" "+r.name);
    })
  );
  const inner=h("div",{onClick:function(e){e.stopPropagation();},style:{background:"#111",border:"2px solid "+G,borderRadius:"8px",padding:"20px",width:"100%",maxWidth:"320px"}},[
    h("div",{style:{color:G,fontSize:"14px",letterSpacing:"2px",marginBottom:"14px",textAlign:"center"}},"NAME ZUWEISEN"),
    all.length===0?h("div",{class:"sans",style:{color:"#555",textAlign:"center",fontSize:"12px",padding:"20px"}},"Keine Namen. Lege Läufer im NAMEN-Tab an."):list,
    h("button",{class:"sans",onClick:function(){S.namePickerFor=null;render();},style:{width:"100%",marginTop:"12px",background:"transparent",color:"#555",border:"1px solid #333",padding:"8px",borderRadius:"3px",cursor:"pointer"}},"Abbrechen")
  ]);
  return h("div",{onClick:function(){S.namePickerFor=null;render();},style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.9)",zIndex:"100",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}},[inner]);
}
